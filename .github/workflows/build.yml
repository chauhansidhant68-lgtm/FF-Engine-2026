name: iOS Pure Swift Compiler
on: [push, workflow_dispatch]
jobs:
  build:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Install Build Tools
        run: brew install xcodegen
          
      - name: Forge Swift Project
        run: |
          cat << 'EOF' > project.yml
          name: FF_Engine
          options:
            bundleIdPrefix: com.fox
          targets:
            FF_Engine:
              type: application
              platform: iOS
              deploymentTarget: "15.0"
              sources: [.]
              settings:
                CODE_SIGNING_ALLOWED: NO
                CODE_SIGNING_REQUIRED: NO
          EOF
          xcodegen generate
          
      - name: Compile Mach-O Binary
        run: |
          xcodebuild archive -project FF_Engine.xcodeproj -scheme FF_Engine -configuration Release -archivePath build/App.xcarchive CODE_SIGNING_ALLOWED=NO CODE_SIGNING_REQUIRED=NO
          mkdir -p Payload
          cp -r build/App.xcarchive/Products/Applications/*.app Payload/
          zip -r FF_Engine_Pure.ipa Payload
          
      - name: Upload Final IPA
        uses: actions/upload-artifact@v4
        with:
          name: FF-Engine-IPA
          path: FF_Engine_Pure.ipa
